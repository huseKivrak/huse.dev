<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>admin</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }
      form {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      input, button {
        font: inherit;
        padding: 14px 16px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #111;
        color: #fff;
        box-sizing: border-box;
        width: 100%;
      }
      input:focus { outline: none; border-color: #666; }
      button {
        background: #fff;
        color: #000;
        border: none;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      #status { font-size: 14px; color: #aaa; min-height: 1.4em; }
      #status.error { color: #f88; }
      #status.ok { color: #8f8; }
    </style>
  </head>
  <body>
    <form id="f" autocomplete="off">
      <input id="topic" name="topic" type="text" placeholder="topic" required autofocus />
      <input id="secret" name="secret" type="password" placeholder="secret" required />
      <button type="submit" id="submit">ship it</button>
      <div id="status"></div>
    </form>
    <script>
      const f = document.getElementById('f')
      const submit = document.getElementById('submit')
      const status = document.getElementById('status')
      const secretInput = document.getElementById('secret')

      const stored = localStorage.getItem('admin_secret')
      if (stored) secretInput.value = stored

      f.addEventListener('submit', async (e) => {
        e.preventDefault()
        submit.disabled = true
        status.className = ''
        status.textContent = 'shipping…'
        const topic = document.getElementById('topic').value.trim()
        const secret = secretInput.value
        try {
          const res = await fetch('/api/topic', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ topic, secret }),
          })
          const data = await res.json()
          if (res.ok) {
            localStorage.setItem('admin_secret', secret)
            status.className = 'ok'
            status.textContent = `shipped: ${data.topic} (${(data.commit || '').slice(0, 7)}) — live in ~30–60s`
            f.reset()
            secretInput.value = secret
          } else {
            status.className = 'error'
            status.textContent = data.error || `error ${res.status}`
          }
        } catch (err) {
          status.className = 'error'
          status.textContent = String(err)
        } finally {
          submit.disabled = false
        }
      })
    </script>
  </body>
</html>
